services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracker-core-api
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: tracker-core-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tracker_core}
      POSTGRES_USER: ${POSTGRES_USER:-tracker_core}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracker_core} -d ${POSTGRES_DB:-tracker_core}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
